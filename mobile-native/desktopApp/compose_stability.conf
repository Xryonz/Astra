// Config de estabilidade do compilador Compose (desktop).
// Classes imutaveis que o compilador marca como "unstable" so por estarem FORA do
// modulo Compose (os DTOs vivem no :shared, sem o plugin) ou por conterem List<>.
// Sao data classes desserializadas e NUNCA mutadas -> declara-las estaveis faz o
// Compose decidir skip por equals ESTRUTURAL (conteudo) em vez de === (instancia).
// Efeito: em listas (chat, amigos, notificacoes, busca), itens recriados com o
// mesmo conteudo param de recompor. Zero mudanca de runtime.

// Todos os DTOs de rede compartilhados.
app.astra.mobile.core.network.dto.*

// Data classes do desktop que viram item de lista.
app.astra.desktop.shell.ChatMessage
app.astra.desktop.shell.PendingFile
